<!DOCTYPE html>
<html>
<head>
  <base href="/landingpage_yourdays/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A quiet journaling app that turns your year into a living mosaic of moods, reflections, and meaning.">

  <!-- OG tags -->
  <meta property="og:title" content="Your Days — Mood Tracking &amp; Journaling">
  <meta property="og:description" content="A quiet journaling app that turns your year into a living mosaic of moods, reflections, and meaning.">
  <meta property="og:type" content="website">

  <!-- Theme color -->
  <meta name="theme-color" content="#1A1412">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Your Days">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Your Days — Mood Tracking &amp; Journaling</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1A1412;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1A1412;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-screen .brand {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    #loading-screen .brand span {
      color: #F5EDE6;
    }

    #loading-screen .brand .accent {
      color: #C1694F;
    }

    #loading-screen .dot {
      width: 6px;
      height: 6px;
      background: #C1694F;
      border-radius: 50%;
      margin-top: 16px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    #loading-screen .inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="inner">
      <div class="brand">
        <span>Your </span><span class="accent">Days</span>
      </div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading-screen');
      if (loading) {
        loading.classList.add('hidden');
        setTimeout(function() {
          var el = document.getElementById('loading-screen');
          if (el && el.parentNode) {
            el.parentNode.removeChild(el);
          }
        }, 450);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
